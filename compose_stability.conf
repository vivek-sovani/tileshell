// Compose compiler stability configuration (S26 recomposition audit).
//
// The Start grid recomposes per scroll/flip frame, reading model objects that
// live in non-Compose modules (so the compiler can't infer their stability) or
// that carry read-only List/Map fields (treated as unstable by default). Every
// type below is deeply immutable in practice — surfaced as read-only snapshots
// via StateFlow and never mutated in place — so listing them lets the compiler
// skip recomposing tiles whose data didn't change.

// :core:data model + settings (compiled without the Compose compiler).
com.tileshell.core.data.*
com.tileshell.core.data.TileModel.App
com.tileshell.core.data.TileModel.Folder
com.tileshell.core.data.settings.*

// Read-only collections: we only ever hand composables immutable snapshots, so
// treating the standard collection interfaces as stable removes the false
// instability they otherwise impose on every data class that holds one
// (e.g. TileModel.Folder.children, NotificationSnapshot.badges/conversations).
kotlin.collections.List
kotlin.collections.Map
kotlin.collections.Set
